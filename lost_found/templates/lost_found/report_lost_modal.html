{% load static %}
<!-- Report Lost Item Modal -->
<div id="report-lost-modal" class="auth-modal">
  <div class="auth-modal-content login-only report-form-modal" style="max-width: 600px; padding: 32px 32px 24px 32px;">
    <span class="auth-modal-close" id="report-lost-modal-close">&times;</span>
    <div class="auth-modal-logo">
      <img src="{% static 'lost_found/images/Hlogo.png' %}" alt="EAC Logo" style="height:80px;display:block;margin:0 auto 10px auto;filter:drop-shadow(0 4px 10px #a8000033);">
    </div>
    <h2 class="auth-modal-title" style="font-size:1.5rem;">Report Lost Item</h2>
    <div class="auth-modal-subtitle report-form-subtitle" style="margin-bottom:18px; grid-column: 1 / -1; text-align:center; width:100%; padding:0 0; max-width:none;">
      Please provide details about your lost item.<br>{% if user.is_staff %}This report will be published immediately for OSA handling.{% else %}An admin will review your report before it becomes visible.{% endif %}
    </div>
    <form id="report-lost-form" method="POST" action="{% url 'report_lost' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="report-form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; grid-template-areas: 
        'name date' 
        'contact time' 
        'title image' 
        'location location' 
        'desc category';">
        <div class="form-group" style="margin-bottom: 10px; grid-area: name;">
          <label for="lost-name">Your Name (optional)</label>
          <input type="text" id="lost-name" name="name" placeholder="Leave blank to show as Anonymous" style="width: 100%; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: date;">
          <label for="lost-date">Date Lost</label>
          <input type="date" id="lost-date" name="date_lost" required style="width:100%;padding:8px;border:1.5px solid #ffd700;border-radius:7px;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: contact;">
          <label for="lost-contact">Contact (Email or Phone)</label>
          <input type="text" id="lost-contact" name="contact" required placeholder="Enter your email or phone" style="width: 100%; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: time;">
          <label for="lost-time">Approximate Time</label>
          <input type="time" id="lost-time" name="time_lost" required style="width:100%;padding:8px;border:1.5px solid #ffd700;border-radius:7px;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: title;">
          <label for="lost-title">Item Name/Title</label>
          <input type="text" id="lost-title" name="title" required placeholder="e.g. Lost EAC ID, Black Wallet" style="width: 100%; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: image;">
          <label for="lost-image">Upload Image (optional)</label>
          <input type="file" id="lost-image" name="image" accept="image/*" style="width: 100%; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: location;">
          <label for="lost-location">Last Seen Location</label>
          <input type="text" id="lost-location" name="location" required placeholder="e.g. Building 4, Canteen" style="width: 100%; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: desc;">
          <label for="lost-description">Detailed Description</label>
          <textarea id="lost-description" name="description" rows="4" required placeholder="Mention brand, color, stickers, or any unique marks..." style="width:100%;box-sizing:border-box;background:#fffbe6;border:2.5px solid #ffd700;border-radius:12px;padding:10px 12px;font-size:1.1rem;font-family:'Orbitron',Arial,sans-serif;color:#a80000;outline:none;margin-bottom:4px;margin-top:0;transition:border 0.2s,box-shadow 0.2s;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom: 10px; grid-area: category;">
          <label for="lost-category">Category</label>
          <select id="lost-category" name="category" required style="width:100%;box-sizing:border-box;background:#fffbe6;border:2.5px solid #ffd700;border-radius:12px;padding:12px 14px;font-size:1rem;font-family:'Orbitron',Arial,sans-serif;color:#a80000;outline:none;height:52px;appearance:none;-webkit-appearance:none;-moz-appearance:none;box-shadow:0 0 0 1px rgba(255,215,0,0.08) inset;">
            <option value="">Select Category</option>
            <option value="Electronics">Electronics</option>
            <option value="Documents">Documents</option>
            <option value="Personal Effects">Personal Belongings</option>
            <option value="Others">Others</option>
          </select>
        </div>
      </div>
      <button type="submit" class="auth-btn" style="margin-top: 10px;">SUBMIT REPORT</button>
    </form>
  </div>
</div>

{% load static %}
<div id="auth-modal" class="auth-modal">
	<div class="auth-modal-content login-only" style="max-width: 400px; padding: 32px 32px 24px 32px; background: #b00000; border-radius: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); border: 1px solid rgba(255, 215, 0, 0.18);">
		<span class="auth-modal-close" id="auth-modal-close">&times;</span>
		<div class="auth-modal-logo" style="text-align:center; margin-bottom:18px;">
			<img src="{% static 'lost_found/images/Hlogo.png' %}" alt="EAC Logo" style="height:70px;display:inline-block;filter:drop-shadow(0 4px 10px #a8000033);">
		</div>
		<h2 class="auth-modal-title" style="text-align:center; font-size:2.2em; font-weight:700; color:#fff; margin-bottom:8px;">Login</h2>
		<div class="auth-modal-subtitle" style="text-align:center; color:#fff; font-size:1.1em; margin-bottom:18px;">Welcome back, General!</div>
		<form id="modal-login-form" method="POST" action="/admin-dashboard-login/">
			{% csrf_token %}
			<label for="modal-login-username" style="color:#fff; font-weight:600; margin-bottom:4px;">Username</label>
			<input type="text" id="modal-login-username" name="username" required placeholder="Enter your username" style="width:100%;padding:10px 12px;margin-bottom:12px;border-radius:6px;border:none;background:#fffbe6;">
			<label for="modal-login-password" style="color:#fff; font-weight:600; margin-bottom:4px;">Password</label>
			<div style="position:relative; margin-bottom:18px;">
				<input type="password" id="modal-login-password" name="password" required placeholder="Enter your password" style="width:100%;padding:10px 48px 10px 12px;margin-bottom:0;border-radius:6px;border:none;background:#fffbe6;">
				<button type="button" id="toggle-password-visibility" style="position:absolute;top:0;right:0;width:46px;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;z-index:2;background:transparent;border:none;padding:0;">
					<img src="{% static 'lost_found/images/eye.svg' %}" alt="Show Password" id="eye-icon" style="width:22px;height:22px;opacity:0.7;display:block;">
				</button>
			</div>
			<button type="submit" class="auth-btn" style="width:100%;padding:12px 0;background:#ffd700;color:#a80000;font-weight:700;font-size:1.1em;border:none;border-radius:8px;box-shadow:0 2px 8px #a8000033;">LOGIN</button>
		</form>
	</div>
</div>
